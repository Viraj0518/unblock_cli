name: gitleaks

# Secret scan on every push and PR. Gates the repo against committed
# credentials (API keys, tokens, private keys, etc.). Runs the upstream
# gitleaks action with full history (fetch-depth: 0) so a secret introduced
# in any commit on the PR branch is caught, not just the tip.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    name: scan for secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
